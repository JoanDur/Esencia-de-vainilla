<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos — Admin Esencia Vainilla</title>
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- ===================== SIDEBAR ===================== -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span class="marca-mini">EV</span> <span>Admin</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin-dashboard.html" class="sidebar-link" id="side-dashboard">
                    <span class="icono">DB</span> <span>Dashboard</span>
                </a>
                <a href="/admin-productos.html" class="sidebar-link" id="side-productos">
                    <span class="icono">PR</span> <span>Productos</span>
                </a>
                <a href="/admin-categorias.html" class="sidebar-link" id="side-categorias">
                    <span class="icono">CA</span> <span>Categorias</span>
                </a>
                <a href="/admin-pedidos.html" class="sidebar-link" id="side-pedidos">
                    <span class="icono">PE</span> <span>Pedidos</span>
                </a>
                <a href="/admin-usuarios.html" class="sidebar-link" id="side-usuarios">
                    <span class="icono">US</span> <span>Usuarios</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-usuario" id="sidebar-usuario"></div>
                <button class="btn-salir-admin" id="btn-salir">Cerrar sesión</button>
            </div>
        </aside>

        <!-- ===================== CONTENIDO ===================== -->
        <main class="admin-contenido">
            <div class="admin-titulo">
                <h1>Productos</h1>
                <p>Gestiona el catálogo de la tienda</p>
            </div>

            <div style="margin-bottom: 20px;">
                <button class="btn btn-primario" id="btn-nuevo">+ Agregar producto</button>
            </div>

            <div class="seccion-tabla">
                <table class="tabla-admin">
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos">
                        <tr><td colspan="7" class="cargando-fila">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- ===================== MODAL ===================== -->
    <div class="modal-overlay oculto" id="modal-overlay">
        <div class="modal">
            <div class="modal-cabecera">
                <h2 id="modal-titulo">Nuevo producto</h2>
                <button class="modal-cerrar" id="modal-cerrar">&times;</button>
            </div>

            <form id="form-producto">
                <input type="hidden" id="prod-id">

                <div class="campo-formulario">
                    <label for="prod-nombre">Nombre *</label>
                    <input type="text" id="prod-nombre" required maxlength="100">
                </div>

                <div class="campo-formulario">
                    <label for="prod-descripcion">Descripción</label>
                    <textarea id="prod-descripcion" rows="2"></textarea>
                </div>

                <div class="form-fila">
                    <div class="campo-formulario">
                        <label for="prod-precio">Precio *</label>
                        <input type="number" id="prod-precio" required min="1" step="0.01">
                    </div>
                    <div class="campo-formulario">
                        <label for="prod-stock">Stock</label>
                        <input type="number" id="prod-stock" min="0" value="0">
                    </div>
                </div>

                <div class="campo-formulario">
                    <label for="prod-categoria">Categoría</label>
                    <select id="prod-categoria">
                        <option value="">Sin categoría</option>
                        <!-- Se cargan dinamicamente -->
                    </select>
                </div>

                <div class="campo-formulario">
                    <label for="prod-imagen">URL de imagen</label>
                    <input type="text" id="prod-imagen" placeholder="https://...">
                </div>

                <div class="campo-checkbox">
                    <input type="checkbox" id="prod-disponible" checked>
                    <label for="prod-disponible">Producto disponible</label>
                </div>

                <div id="modal-mensaje" class="mensaje"></div>

                <div class="modal-acciones">
                    <button type="button" class="btn btn-secundario" id="modal-cancelar">Cancelar</button>
                    <button type="submit" class="btn btn-primario" id="btn-guardar">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/admin.js"></script>
    <script src="/js/admin-productos.js"></script>
</body>
</html>
